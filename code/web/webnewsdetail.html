<body>
	<div class="container">

		<div class="container">
			<div class="sixteen columns page-title">
				<div class="eight columns alpha">
					<h3> <span>论坛趣事</span> </h3>
				</div>
				<div class="clearfix"></div>
			</div><!-- page-title -->
		</div><!-- container -->

				<div class="twelve columns">
					<!-- Post 1 -->
					<div class="post-preview">
						<!-- Post Title & Meta -->
						<h2><a  class="dark-link" id="TITLE"></a></h2>
						<div class="post-meta">
							 来源： <span class="meta-author"><a id="STEMFROM"></a></span>
							<span class="meta-date" id="CTIME"></span>
						</div>
						<!-- End Post Image -->
						<p id="CONTENT">
							
						</p>
					</div>
					<!-- End Post 1 -->	
				</div>
	</div>
	<!-- container -->

	<script type="text/javascript">
		$(window).load(function() {
			getId();
		});
		
		function getId(){
			var NEWID = ((window.location+"").split('NEWID='))[1].substring(0,32);
			$.ajax({
				type: "POST",
				url: 'web/getNew.do',
		    	data: {NEWID:NEWID,tm:new Date().getTime()},
				dataType:'json',
				cache: false,
				success: function(data){
					 $("#CONTENT").html(data.new.CONTENT);
					 $("#TITLE").html(data.new.TITLE);
					 $("#STEMFROM").html(data.new.STEMFROM);
					 $("#CTIME").html("    "+data.new.CTIME);
				}
			});
		}
	</script>
